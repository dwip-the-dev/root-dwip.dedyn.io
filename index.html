<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dwip’s Network</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 2.4em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00b4d8, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.tagline {
      color: #aaa;
      font-size: 1em;
      margin-bottom: 35px;
      text-align: center;
    }
    .section {
      margin-bottom: 40px;
      width: 100%;
      max-width: 500px;
    }
    .section h2 {
      font-size: 1.3em;
      margin-bottom: 15px;
      color: #00b4d8;
      border-left: 3px solid #00b4d8;
      padding-left: 10px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      color: #fff;
      text-decoration: none;
      background: #111;
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #222;
      transition: all 0.3s ease;
    }
    a:hover {
      background: linear-gradient(90deg, #00b4d8, #00ff88);
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 0 15px #00ff8855;
    }
    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Dwip’s Network</h1>
  <p class="tagline">All my links, projects & socials ⚡</p>

  <div id="app"></div>

  <footer>© 2025 Dwip — All rights reserved</footer>

  <script>
    const data = [
      {
        title: "📫 Contact & Socials",
        links: [
          {
            name: "Email",
            url: "mailto:dwip@dwip.dedyn.io"
          },
          {
            name: "GitHub",
            url: "https://github.com/dwip-the-dev"
          },
          {
            name: "Telegram",
            url: "https://t.me/dwip_thedev"
          }
        ]
      },

      {
        title: "🧠 Projects",
        links: [
          {
            name: "LemonOS",
            url: "https://lemonos.dwip.dedyn.io"
          },
          {
            name: "PythonForLosers",
            url: "https://pythonforlosers.dwip.dedyn.io"
          },
          {
            name: "HMS",
            url: "https://hms.dwip.dedyn.io"
          },
          {
            name: "AIOFiles",
            url: "https://aiofiles.dwip.dedyn.io"
          },
          {
            name: "OpnBook",
            url: "https://opnbook.dwip.dedyn.io"
          },
          {
            name: "Portfolio",
            url: "https://dwip.me"
          },
          {
            name: "ByteSpace",
            url: "https://bytespace.dwip.dedyn.io"
          },
          {
            name: "FastDroid",
            url: "https://fastdroid.vercel.app"
          },
          {
            name: "MyTree",
            url: "https://mytree.dwip.dedyn.io"
          },
          {
            name: "Linusify",
            url: "https://linusify.dwip.dedyn.io"
          },
          {
            name: "MyMeet",
            url: "https://mymeet.dwip.dedyn.io"
          }
        ]
      }
    ];

    const app = document.getElementById("app");

    data.forEach(section => {
      const sectionDiv = document.createElement("div");
      sectionDiv.className = "section";

      const title = document.createElement("h2");
      title.textContent = section.title;

      const linksDiv = document.createElement("div");
      linksDiv.className = "links";

      section.links.forEach(link => {
        const a = document.createElement("a");

        a.href = link.url;
        a.textContent = link.name;
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        linksDiv.appendChild(a);
      });

      sectionDiv.appendChild(title);
      sectionDiv.appendChild(linksDiv);

      app.appendChild(sectionDiv);
    });
  </script>
</body>
</html>
